<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Doctor</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #e6f4ea; 
            font-family: arial, sans-serif;
        }

        .Box {
            width: 420px;
            background: white;
            margin: 60px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2e7d32;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #7cb342;
            border-radius: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background: #1b5e20;
        }

        a {
            display: block;
            margin-top: 18px;
            text-align: center;
            text-decoration: none;
            color: #2e7d32;
            font-weight: bold;
        }

        .flash {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- flash message box -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash" style="color:
                {% if category=='danger' %}red
                {% elif category=='success' %}green
                {% else %}black
                {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="Box">

    <h2>Register Doctor</h2>

    <form method="POST" action="{{ url_for('admin.register_doctor') }}">

        <input type="text" name="name" placeholder="doctor name" required>

        <input type="email" name="email" placeholder="email" required>

        <input type="text" name="contact" placeholder="contact number" required>

        <input type="password" name="password" placeholder="password" required>

        <select name="departmentid" required>
            <option value="">select department</option>
            {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
        </select>

        <input type="submit" value="Add Doctor">

    </form>

    <a href="{{ url_for('admin.dashboard') }}">Back to Dashboard</a>

</div>

</body>
</html>
