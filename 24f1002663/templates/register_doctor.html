<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New Doctor</title>
</head>
<body>
    <h2>Register New Doctor</h2>

    <form method="POST" action="{{ url_for('admin.register_doctor') }}">
        <p>Name: <input type="text" name="name" required></p>
        <p>Email: <input type="email" name="email" required></p>
        <p>Contact: <input type="text" name="contact" required></p>
        <p>Password: <input type="password" name="password" required></p>

        <p>
            Department:
            <select name="departmentid" required>
                <option value=""> Select Department </option>
                {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </p>

        <p><input type="submit" value="Add Doctor"></p>
    </form>
    <a href="{{ url_for('admin.dashboard') }}">⬅ Back to Dashboard</a>

</body>
</html>
