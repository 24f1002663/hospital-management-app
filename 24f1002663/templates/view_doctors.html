<!DOCTYPE html>
<html>
<head>
    <title>View Doctors</title>
</head>
<body>

<h2>Doctor Management</h2>

<form method="GET" action="{{ url_for('admin.search_doctor') }}">
    <p>
        Search Doctor:
        <input type="text" name="query" value="{{ query or '' }}" placeholder="Enter name or specialization">
        <input type="submit" value="Search">
    </p>
</form>

<!-- Doctors Table -->
<table border="1" >
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Specialization</th>
        <th>Department</th>
        <th>Update</th>
    </tr>

    {% for doctor in doctors %}
    <tr>
        <td>{{ doctor.id }}</td>
        <td>{{ doctor.user.name if doctor.user else 'N/A' }}</td>
        <td>{{ doctor.specialization }}</td>
        <td>
            {% if doctor.department %}
                {{ doctor.department.name }}
            {% else %}
                N/A
            {% endif %}
        </td>
        <td>
            <form method="POST" action="{{ url_for('admin.update_doctor', doctor_id=doctor.id) }}">
                <label for="departmentid_{{ doctor.id }}">Change Department:</label>
                <select name="departmentid" id="departmentid_{{ doctor.id }}">
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}"
                            {% if doctor.departmentid == dept.id %}selected{% endif %}>
                            {{ dept.name }}
                        </option>
                    {% endfor %}
                </select>
                <input type="submit" value="Update">
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
