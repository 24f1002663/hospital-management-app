<!DOCTYPE html>
<html>
<head>
    <title>Update User</title>
</head>
<body>
    <h2>Update User Details</h2>

    <form method="POST" action="{{ url_for('admin.update_user', user_id=user.id) }}">
        <p>Name: <input type="text" name="name" value="{{ user.name }}" required></p>
        <p>Email: <input type="email" name="email" value="{{ user.email }}" required></p>
        <p>Contact: <input type="text" name="contact" value="{{ user.contact }}" required></p>
        <p>Role: <input type="text" name="role" value="{{ user.role }}" required></p>
        <p>Status: 
            <select name="status">
                <option value="active" {% if user.status == 'active' %}selected{% endif %}>Active</option>
                <option value="inactive" {% if user.status == 'inactive' %}selected{% endif %}>Inactive</option>
                <option value="blocked" {% if user.status == 'blocked' %}selected{% endif %}>Blocked</option>
            </select>
        </p>
        <p><input type="submit" value="Update"></p>
    </form>

    <form method="POST" action="{{ url_for('admin.delete_user', user_id=user.id) }}" onsubmit="return confirm('Are you sure you want to delete this user?');">
        <button type="submit" style="background-color: red; color: white;">Delete User</button>
    </form>

    <p><a href="{{ url_for('admin.dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
